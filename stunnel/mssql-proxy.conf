; ============================================================
; stunnel TLS bridging proxy for SQL Server
; ============================================================
;
; PURPOSE:
;   Windows 7 clients cannot natively use TLS 1.2 which is
;   required by the SQL Server. This proxy sits between the
;   Win7 clients and SQL Server, accepting plain TCP or TLS 1.0
;   connections and always forwarding them to SQL Server over
;   TLS 1.2.
;
; ARCHITECTURE:
;   Win7 (plain TCP)  --> Ubuntu:1433 --> SQL Server:1433 (TLS 1.2)
;   Win7 (TLS 1.0)    --> Ubuntu:1434 --> SQL Server:1433 (TLS 1.2)
;
; SQL SERVER SETTINGS:
;   - Authentication : SQL Server login (username/password)
;                      Credentials are set in the Win7 connection
;                      string, stunnel does not handle auth.
;   - Encryption     : optional (SQL Server allows both encrypted
;                      and unencrypted connections)
;   - Trust cert     : yes — SQL Server uses a self-signed or
;                      internal cert, so chain validation is skipped
;
; WIN7 CONNECTION STRING (ODBC / ADO):
;   Server=<ubuntu-vm-ip>,1433;       <- plain TCP port
;   Server=<ubuntu-vm-ip>,1434;       <- TLS 1.0 port
;   Database=<dbname>;
;   Uid=<username>;
;   Pwd=<password>;
;   Encrypt=optional;                 <- matches SQL Server setting
;   TrustServerCertificate=yes;       <- required, cert is not CA-signed
;
; NOTES:
;   - Do NOT put credentials in this file, they belong in the
;     Win7 connection string only.
;   - If SQL Server moves to a new IP, update the 'connect' lines
;     in both sections below and restart the container:
;       docker compose restart
;   - To restrict which Win7 IPs can connect, change 0.0.0.0
;     to a specific IP or subnet, e.g. 192.168.1.0/24
; ============================================================


; ------------------------------------------------------------
; GLOBAL SETTINGS
; ------------------------------------------------------------

; Path to the stunnel PID file (used internally by the process)
pid = /var/run/stunnel/stunnel.pid

; Send all log output to stdout so Docker can capture it via:
;   docker compose logs -f
output = /dev/stdout

; Disable syslog — we use stdout (Docker handles log routing)
syslog = no

; Run in foreground so Docker can manage the process lifecycle.
; If this is set to 'no', Docker will think the container exited.
foreground = yes


; ------------------------------------------------------------
; SECTION 1: mssql-plain
; Accepts plain TCP (unencrypted) connections from Win7 clients
; and forwards them to SQL Server over TLS 1.2
; ------------------------------------------------------------
[mssql-plain]

; client = yes means stunnel acts as a TLS CLIENT toward SQL Server.
; It does NOT mean only clients can connect to it.
; stunnel will initiate the TLS 1.2 handshake with SQL Server.
client = yes

; Accept incoming connections from any IP on port 1433.
; This is the standard SQL Server port — Win7 apps can connect
; without any changes to the port number.
; To restrict to specific Win7 subnet: accept = 192.168.1.0/24:1433
accept = 0.0.0.0:1433

; Forward all connections to SQL Server on this IP and port.
; CHANGE THIS to your actual SQL Server IP if different.
connect = 192.168.2.50:1433

; Force TLS 1.2 for the outbound connection to SQL Server.
; This is the core of the bridge — Win7 sends plain, we send TLS 1.2.
sslVersion = TLSv1.2

; Do not validate the SQL Server TLS certificate chain.
; Required because SQL Server uses a self-signed or internal cert
; that is not signed by a public CA.
; Set to 'yes' only if you have the SQL Server cert in a local CAfile.
verifyChain = no

; Do not validate the hostname in the SQL Server certificate.
; Required when the cert CN does not match the IP address we connect to.
checkHost = no


; ------------------------------------------------------------
; SECTION 2: mssql-tls10
; Accepts TLS 1.0 connections from Win7 clients and re-wraps
; them as TLS 1.2 toward SQL Server.
; Use this port if the Win7 app already negotiates TLS 1.0.
; ------------------------------------------------------------
[mssql-tls10]

; Same as above — stunnel acts as TLS client toward SQL Server
client = yes

; Accept TLS 1.0 connections on port 1434.
; Win7 connection string must specify this port explicitly:
;   Server=<ubuntu-vm-ip>,1434
; To restrict to specific Win7 subnet: accept = 192.168.1.0/24:1434
accept = 0.0.0.0:1434

; Same SQL Server destination as the plain section.
; Both ports forward to the same SQL Server instance.
; CHANGE THIS to your actual SQL Server IP if different.
connect = 192.168.2.50:1433

; Force TLS 1.2 outbound regardless of what TLS version Win7 sent.
; This is the re-wrapping step: TLS 1.0 in, TLS 1.2 out.
sslVersion = TLSv1.2

; Skip certificate chain validation (same reason as above)
verifyChain = no

; Skip hostname validation in the certificate (same reason as above)
checkHost = no

